## Design: FASE 12 ΓÇö Mejoras de Backtesting, Scanner y Trades

### 1. Architecture Overview

The change touches 4 existing files with zero new modules. Data flows from the Rich menu (`app.py`) into the backtesting engine (`backtesting.py`) for inline backtests, and into the scanner subsystem (`filters.py`, `scanner.py`) which runs either inline in the bot process or via `trigger_scanner()` file-based signaling. The trades screen (`_show_trades`) reads from `state_loader.load_trades()` (backed by `trades.json`) and applies in-memory filtering only.

**Integration points:**
- `_quick_backtest()` and `_builder_flow()` call `run_backtest()` inline ΓåÆ tqdm bars render in the menu stdout.
- `_show_scanner()` reads `scanner_results.json` saved by the bot process ΓåÆ post-scan metrics come from the persisted JSON.
- `_show_trades()` loads `trades.json` ΓåÆ summary metrics computed inline, filtering done in-memory.
- `_show_simulation()` loads trades and checks count inline before the strategy selection step.

