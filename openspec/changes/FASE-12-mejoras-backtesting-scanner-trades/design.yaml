### 5. Implementation Plan

**Phase 1: Backtest improvements** (no dependencies)
1. Add tqdm imports and loops to `run_backtest()`
2. Add 4 new metrics to `_compute_metrics()` ΓÇö `sortino_ratio`, `calmar_ratio`, `expectancy`, `avg_trade_duration`
3. Create `_display_backtest_trades()` helper
4. Create `_display_buy_hold_comparison()` helper
5. Update `_quick_backtest()` ΓÇö new metric rows, <30 warning, trade table, B&H panel
6. Verify: run backtest from strategy submenu, check all outputs

**Phase 2: Scanner improvements** (no dependencies on Phase 1)
1. Add tqdm to `LiquidityFilter.filter()` in `filters.py`
2. Add tqdm + initial ETA + elapsed tracking to `Scanner.scan()` in `scanner.py`
3. Add `elapsed_seconds` to `_publish_scanner_results()`
4. Add post-scan metrics panel to `_show_scanner()`
5. Verify: trigger scan, check progress bars and metrics in saved results + menu

**Phase 3: Trades redesign** (independent)
1. Add Sharpe, Avg Trade, Max DD, Expectancy computation to `_show_trades()`
2. Enrich trade table columns: Fecha, Duraci├│n, Slippage, Retorno%, Estrategia
3. Restructure filter loop: `active_filters` dict, single-key S/E/F/T/X/V in submenu
4. Add active filters header display
5. Apply ANSI color rules (P&L green/red, WR >60% green)
6. Verify: view trades, test all filter keys and color outputs

**Phase 4: Simulation warning** (no dependencies)
1. Add <30 trades check + blocking confirm prompt in `_show_simulation()`
2. Verify: simulate with <30 trades, test both "s" and non-"s" paths

### 6. Risk Register

| Risk | Impact | Mitigation |
|------|--------|------------|
| tqdm + Rich Console output conflict | Garbled screen in menu | tqdm writes to stdout with carriage returns; Rich uses stderr/own rendering. Test with `color_system="standard"`. Use `tqdm(file=sys.stdout)`. In menu context, tqdm output appears above Rich panels, acceptable. |
| Missing `entry_date`/`exit_date` in old trades from `trades.json` | Duration = 0.0, Fecha = "ΓÇö" | Use `.get("entry_at", "")` / `.get("exit_at", "")` fallback. Duration = 0 when dates missing. |
| `buy_hold_equity` is None or empty in result | B&H panel crash | Check `if not buy_hold_equity or len(buy_hold_equity) < 2` before computing. Show "No disponible". |
| Scanner runs in bot process, not menu | Menu can't show live progress | Acceptable by design. tqdm bars show in bot stdout. Menu reads persisted `elapsed_seconds` for post-scan panel. |
| KeyboardInterrupt during tqdm loop | Partial/orphaned output | tqdm handles Ctrl+C gracefully (closes bar, re-raises). The outer `try/except KeyboardInterrupt` in menu functions catches it. |
| `old_trades.json` without `slippage_bps` field | KeyError in enriched table | Use `.get("slippage_bps", 0)` with default 0. |
| `avg_trade_duration` with 0 trades | Division by zero | Return 0.0 when `trades_df` is None or empty. |

