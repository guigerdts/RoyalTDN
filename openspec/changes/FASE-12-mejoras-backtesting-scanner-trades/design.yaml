#### src/royaltdn/scanner/scanner.py

**`Scanner.__init__()` ΓÇö no signature change.**

**`Scanner.scan()` ΓÇö signature unchanged, tqdm + metrics added:**

Current: `def scan(self) -> List[dict]:`
New: Same return type. Internal additions:

1. **Initial ETA** (RQ-SC-04): Before line 87 (scan loop), compute:
   ```python
   import time
   import math
   _start = time.monotonic()
   est_seconds = len(passed_symbols) * 0.3  # 0.3s per symbol heuristic
   est_minutes = math.ceil(est_seconds / 60)
   tqdm.write(f"Escaneando {len(passed_symbols)} s├¡mbolos... ~{est_minutes}min restante")
   ```

2. **tqdm scan loop** (RQ-SC-02): Replace `for symbol in passed_symbols:` with:
   ```python
   from tqdm import tqdm
   pbar = tqdm(passed_symbols, desc="Escaneando", unit="sym",
               file=sys.stdout,
               bar_format="{desc}: {n_fmt}/{total_fmt} ΓÇö {percentage:.0f}% completado. ~{remaining}")
   for symbol in pbar:
       pbar.set_description(f"Escaneando {symbol}")
       ...
   ```

3. **Elapsed time storage**: After scan loop, compute:
   ```python
   self._last_scan_elapsed = time.monotonic() - _start
   ```
   And add to `scan_entry` dict before appending to `_scan_history`:
   ```python
   "elapsed_seconds": round(self._last_scan_elapsed, 1)
   ```

4. **`_publish_scanner_results()` change**: Include elapsed time in the JSON:
   ```python
   "elapsed_seconds": self._last_scan_elapsed if hasattr(self, '_last_scan_elapsed') else 0.0
   ```

No change to `_get_symbol_data()`, `_rank_signals()`, or `get_top_signals()`.

