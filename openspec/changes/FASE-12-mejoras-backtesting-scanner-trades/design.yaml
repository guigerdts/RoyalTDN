### 3. File Changes

#### src/royaltdn/strategy/backtesting.py

**`_compute_metrics()` ΓÇö signature unchanged, 4 new keys in return dict:**

Current: `def _compute_metrics(pf_close: pd.Series, trades_df: pd.DataFrame) -> dict:`
New: Same signature. Addition of 4 keys inside the function.

New metrics and formulas:

| Key | Formula | Edge Case |
|-----|---------|-----------|
| `sortino_ratio` | Same as current `sortino`: sqrt(252) * mean(daily_returns) / std(downside_returns). **Renamed** from `sortino`; old key kept as alias for backward compat. | downside.std() == 0 ΓåÆ 0.0 |
| `calmar_ratio` | CAGR / abs(max_drawdown) | max_drawdown == 0 ΓåÆ return CAGR |
| `expectancy` | (win_rate * avg_win) - ((1 - win_rate) * abs(avg_loss)) | num_trades == 0 ΓåÆ 0.0 |
| `avg_trade_duration` | mean of (parse(exit_date) - parse(entry_date)).days for all trades | trades_df is None or empty ΓåÆ 0.0. Missing date fields ΓåÆ skip that trade. |

The existing `sortino` key is preserved with the same value; `sortino_ratio` is added alongside it. All existing keys remain untouched.

**`run_backtest()` ΓÇö signature unchanged, tqdm added internally:**

Current: `def run_backtest(config: dict, symbol: str = "SPY", timeframe: str = "1D", period: str = "2 years", init_cash: float = 10_000.0, fee_pct: float = 0.001, slippage_pct: float = 0.0005) -> dict:`
New: Same signature.

tqdm placement:
1. **Signal generation loop** (line 191): `for i in tqdm(range(1, len(df)), desc=f"{symbol} {timeframe} ({period})", unit="bar", file=sys.stdout):`
   - bar_format: `"{desc} ΓÇö {n}/{total} barras {bar} {percentage:.0f}% [{elapsed}<{remaining}]"`
2. **Portfolio simulation loop** (line 231): `for i in tqdm(range(1, len(df)), desc="Simulando cartera", unit="bar", file=sys.stdout):`
   - bar_format: `"{desc} ΓÇö {n}/{total} barras {bar} {percentage:.0f}% [{elapsed}<{remaining}]"`

Both imports are lazy: `from tqdm import tqdm` at function level.

Return value: No shape change. `result["metrics"]` dict now includes the 4 new keys.

**New helper: `_display_backtest_trades(trades: list, console) -> None`**
- Renders a Rich Table with columns: `#`, `Entry Date`, `Exit Date`, `Entry Price`, `Exit Price`, `P&L`, `Return %`, `Duration`, `Fees`
- P&L color: green if >= 0, red if < 0, white if 0
- Empty trades ΓåÆ shows `"ΓÜá∩╕Å No se generaron trades en este per├¡odo."` in yellow
- Duration = (exit_date - entry_date) in days with 1 decimal, or "< 1d" for same-day

**New helper: `_display_buy_hold_comparison(buy_hold_equity: list, metrics: dict, console) -> None`**
- Computes BH return: `(bh_equity[-1] / bh_equity[0]) - 1` if len >= 2
- BH CAGR: BH return annualized over period
- Strategy vs BH: `metrics["total_return"] - bh_return`
- Renders "≡ƒôè Comparaci├│n: Estrategia vs Buy & Hold" Panel
- If `buy_hold_equity` is empty or None ΓåÆ shows "No disponible" in gray

