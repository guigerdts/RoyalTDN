color_contract:
  system: "Console(color_system='standard') — 16-color ANSI only"
  forbidden: ["#rrggbb hex", "24-bit RGB", "emoji in UI"]
  styles:
    "P&L positive": "bold green (ANSI 32)"
    "P&L negative": "bold red (ANSI 31)"
    "Panel title": "bold white"
    "No data": "dim white"
    "Table header": "bold white"
    "Border": "white"
    "Action BUY": "green"
    "Action SELL": "red"

