id: "FASE-13-scanner-universo-real"
title: "FASE 13: Scanner con Universo Real de Activos"
phase: spec
created: "2026-06-20"

summary: >
  Professionalize the scanner for production: make SCANNER_UNIVERSE
  operational, add rate limiting with exponential backoff, fix the menu
  display bug, convert Scanner.scan() to async, migrate AssetUniverse
  to alpaca-py SDK, add asset cache with TTL, batch data downloads,
  declare tqdm dependency, and add post-scan metrics in the menu.

domains:
  universe:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/universe/spec.md"
    requirements:
      - REQ-UNIVERSE-CONFIG: "Universo configurable por entorno (etfs/sp500/all)"
      - REQ-UNIVERSE-SDK: "AssetUniverse usa alpaca-py SDK en vez de requests"

  rate-limiting:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/rate-limiting/spec.md"
    requirements:
      - REQ-RATE-LIMIT: "Token bucket rate limiter (200 req/min) para API calls"
      - REQ-RETRY: "Exponential backoff retry para HTTP 429, 503, timeouts"

  display:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/display/spec.md"
    requirements:
      - REQ-DISPLAY-FIX: "Menú scanner usa last_scan['top_signals'] y tabla rankeada"

  async:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/async/spec.md"
    requirements:
      - REQ-ASYNC-SCAN: "Scanner.scan() no bloquea el event loop (run_in_executor)"

  cache:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/cache/spec.md"
    requirements:
      - REQ-CACHE: "Asset cache in-memory con TTL configurable (default 300s)"
      - REQ-BATCH-DATA: "get_stock_bars agrupado en batches de 100 símbolos"

  integration:
    type: full
    path: "openspec/changes/FASE-13-scanner-real/specs/integration/spec.md"
    requirements:
      - REQ-AUTO-SCAN: "Auto-scan cada SCANNER_INTERVAL_MINUTES desde legacy loop"
      - REQ-MANUAL-SCAN: "Scan manual desde opción 2 del menú"
      - REQ-METRICS-PANEL: "Post-scan metrics panel en _show_scanner"
      - REQ-TQDM-DEP: "tqdm como dependencia explícita en pyproject.toml"

