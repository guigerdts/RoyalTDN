    - "KeyboardInterrupt durante scan en executor"
    - "Scan completado — resultados disponibles post-ejecución"
    - "Error dentro del executor — no crashea el menú"
    - "Múltiples scans consecutivos — no hay race conditions"
    - "Timeout alcanzado — scan parcial descartado"
  REQ-CACHE:
    - "Cache de activos con TTL default 300s"
    - "Cache hit retorna datos sin llamar API"
    - "Cache miss — fetch de API + store"
    - "TTL expirado — refetch en próximo acceso"
    - "Invalidez al cambiar SCANNER_UNIVERSE"
    - "Cache vacío — primer fetch funciona"
    - "get_stock_bars con batches de 100 símbolos"
    - "Reducción de ~400 calls a ~4 calls para 400 símbolos"
    - "Batch parcial (<100 símbolos) se envía completo"
