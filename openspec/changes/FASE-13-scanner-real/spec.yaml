    - "Rate limiter bloquea hasta tener tokens disponibles"
    - "Burst de requests consume tokens hasta vaciar el bucket"
    - "Bucket vacío — espera hasta refill"
    - "Refill después de 60 segundos"
  REQ-RETRY:
