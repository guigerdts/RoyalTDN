# ── Color/Style Contract (global) ──
color_contract:
  system: "Console(color_system='standard') — 16-color ANSI only"
  forbidden: ["#rrggbb hex", "24-bit RGB", "emoji in UI (except ⚠️, 📊, 🔔, 💰, 🔼, 🔽)"]
  styles:
    "P&L positive": "bold green (ANSI 32)"
    "P&L negative": "bold red (ANSI 31)"
    "P&L zero": "white (default)"
    "Warning": "bold yellow"
    "Win Rate > 60%": "green (ANSI 32)"
    "Win Rate ≤ 60%": "default white"
    "Active filters label": "italic blue"
    "No data / no trades": "dim (gray italic)"
    "Table header": "bold white"
    "Border": "white"

