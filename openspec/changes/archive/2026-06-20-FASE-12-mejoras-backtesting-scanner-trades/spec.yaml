id: "FASE-12-mejoras-backtesting-scanner-trades"
title: "FASE 12: Mejoras de Backtesting, Scanner y Trades"
phase: spec
created: "2026-06-19"

# ── Overview ──
summary: "Professionalize the backtesting, scanner, and trades screens of the Rich interactive menu.
Adds tqdm progress bars, professional metrics (Sortino, Calmar, Expectancy, Avg Trade Duration),
Buy & Hold comparison, enriched trade tables, single-key cumulative filters, ANSI color semantics,
scanner progress bars with ETA, post-scan metrics, and statistical validity warnings."

# ── Domains ──
domains:
  backtesting:
    type: full
    path: "openspec/changes/FASE-12-mejoras-backtesting-scanner-trades/specs/backtesting/spec.md"
    requirements:
      - RQ-BT-01: "Progress bar (tqdm) during run_backtest() signal and portfolio loops"
      - RQ-BT-02: "ETA display in seconds/minutes format"
      - RQ-BT-03: "New metrics: sortino_ratio, calmar_ratio, expectancy, avg_trade_duration"
      - RQ-BT-04: "Non-blocking warning when num_trades < 30"
      - RQ-BT-05: "Trade detail table with 9 columns after metrics"
      - RQ-BT-06: "Buy & Hold comparison panel"

  scanner:
    type: full
    path: "openspec/changes/FASE-12-mejoras-backtesting-scanner-trades/specs/scanner/spec.md"
    requirements:
      - RQ-SC-01: "tqdm in LiquidityFilter.filter() with percentage and ETA"
      - RQ-SC-02: "tqdm in Scanner.scan() with symbol name, percentage and ETA"
      - RQ-SC-03: "Post-scan metrics panel (total, passed, signals, time)"
      - RQ-SC-04: "Initial ETA estimate message before scan"

  trades:
    type: delta
    path: "openspec/changes/FASE-12-mejoras-backtesting-scanner-trades/specs/interactive-menu/spec.md"
    requirements:
      - RQ-TR-01: "Enhanced summary: Sharpe, Avg Trade, Max Drawdown, Expectancy"
      - RQ-TR-02: "Enriched trade table with Fecha, Duración, Slippage, Retorno%, Estrategia"
      - RQ-TR-03: "Single-key filters (S/E/F/T/X/V) with cumulative AND logic"
      - RQ-TR-04: "ANSI 16-color contract: P&L green/red, WR >60% green"

  simulation:
    type: delta
    path: "openspec/changes/FASE-12-mejoras-backtesting-scanner-trades/specs/what-if-simulation/spec.md"
    requirements:
      - RQ-SI-01: "Blocking warning when < 30 historical trades before simulation"

