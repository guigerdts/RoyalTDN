- name: swing_reversion
  symbols:
  - BTCUSDT
  - ETHUSDT
  - LINKUSDT
  symbol: LINKUSDT
  timeframe: 1d
  entry:
    logic: AND
    conditions:
    - indicator: bollinger
      params:
        period: 20
        std: 2.0
      operator: 'price < lower'
    - indicator: rsi
      params:
        period: 14
      operator: '< 35'
  exit:
  - type: take_profit
    params:
      atr_multiplier: 2.0
  risk:
    sizing: 0.06
    max_positions: 1
- name: swing_trend_following
  symbol: BTCUSDT
  timeframe: 1d
  entry:
    logic: AND
    conditions:
    - indicator: ichimoku
      params:
        tenkan: 19
        kijun: 10
        senkou_b: 64
  exit:
  - type: trailing_stop
    params:
      atr_multiplier: 2.7
  risk:
    sizing: 0.030000000000000002
    max_positions: 5
- name: swing_breakout
  symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  symbol: ETHUSDT
  timeframe: 1d
  entry:
    logic: AND
    conditions:
    - indicator: range_breakout
      params:
        period: 4
        factor: 1.0
    - indicator: volume_surge
      params:
        period: 35
        factor: 3.6
  exit:
  - type: stop_loss
    params:
      atr_multiplier: 0.5
  - type: take_profit
    params:
      atr_multiplier: 0.5
  risk:
    sizing: 0.025
    max_positions: 4
- name: swing_mean_reversion
  symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  symbol: SOLUSDT
  timeframe: 1d
  entry:
    logic: AND
    conditions:
    - indicator: bollinger
      params:
        period: 20
        std: 2.0
      operator: 'price < lower'
    - indicator: rsi
      params:
        period: 14
      operator: '< 35'
  exit:
  - type: take_profit
    params:
