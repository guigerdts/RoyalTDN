- name: swing_momentum
  symbols:
  - BTCUSDT
  - ETHUSDT
  - ADAUSDT
  symbol: ADAUSDT
  timeframe: 1d
  entry:
    logic: AND
    conditions:
    - indicator: ema
      params:
        period: 10
      operator: 'price > ema'
    - indicator: adx
      params:
        period: 14
      operator: '> 20'
  exit:
  - type: trailing_stop
    params:
      atr_multiplier: 2.0
  risk:
    sizing: 0.02
    max_positions: 1
