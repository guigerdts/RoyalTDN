- name: scalping_momentum
  symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - ADAUSDT
  - LINKUSDT
  symbol: BTCUSDT
  timeframe: 1m
  entry:
    logic: AND
    conditions:
    - indicator: momentum
      params:
        period: 20
      operator: '> 39.0'
    - indicator: volume_surge
      params:
        period: 37
        factor: 3.2
      operator: '> 14.0'
    - indicator: rsi
      params:
        period: 9
      operator: < 11.0
  exit:
  - type: stop_loss
    params:
      atr_multiplier: 5.300000000000001
  - type: take_profit
    params:
      atr_multiplier: 3.8000000000000003
  risk:
    sizing: 0.07500000000000001
    max_positions: 1
- name: scalping_breakout
  symbol: SOLUSDT
  timeframe: 1m
