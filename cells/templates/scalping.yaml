    logic: AND
    conditions:
    - indicator: range_breakout
      params:
        period: 17
        factor: 0.8
    - indicator: volume_surge
      params:
        period: 34
        factor: 5.0
  exit:
  - type: stop_loss
    params:
      atr_multiplier: 1.1
  - type: take_profit
    params:
      atr_multiplier: 5.1000000000000005
  risk:
    sizing: 0.025
