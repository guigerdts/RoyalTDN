broker: paper
testnet: true
symbols:
  - BTCUSDT
  - ETHUSDT
  - LINKUSDT
  - SOLUSDT
  - ADAUSDT
strategies_dir: cells/templates/
initial_capital: 100000.0
max_positions: 10
max_drawdown: 0.20
telegram_token: ""
telegram_chat_id: ""
telegram_level: "normal"
telegram_equity_threshold: 1.0
telegram_summary_interval: 15
kill_switch_drawdown: 0.30

# Periodic optimization (used when run.py --optimize is active)
optimization:
  interval_days: 30
  metric: sharpe
  trials: 100
