name: intraday_smf_retest_bollinger
enabled: true
symbol: ETHUSDT
symbols:
- ETHUSDT
- BTCUSDT
- ADAUSDT
- LINKUSDT
timeframe: 1h
max_hold_hours: 24
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow > 0.0
  - indicator: smf_basis
    params: {}
    operator: price < smf_basis
  - indicator: bollinger_lower
    params:
      period: 20
      std: 2.0
    operator: price < bollinger_lower
short_entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow < 0.0
  - indicator: smf_basis
    params: {}
    operator: price > smf_basis
  - indicator: bollinger_upper
    params:
      period: 20
      std: 2.0
    operator: price > bollinger_upper
exit:
- type: stop_loss
  params:
    pct: 1.0
- type: take_profit
  params:
    pct: 2.0
- type: trailing_stop
  params:
    atr_multiplier: 2.0
    min_mult: 0.5
    max_mult: 1.5
- type: stop_loss
  params:
    atr_multiplier: 3.0
risk:
  sizing: 0.01
  max_positions: 3
