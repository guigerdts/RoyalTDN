name: intraday_smf_trend_adx
enabled: true
symbol: BTCUSDT
symbols:
- BTCUSDT
- ETHUSDT
- SOLUSDT
- ADAUSDT
- LINKUSDT
timeframe: 1h
max_hold_hours: 24
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow > 0.0
  - indicator: smf_strength
    params: {}
    operator: smf_strength > 0.4
  - indicator: adx
    params:
      period: 14
    operator: '> 20.0'
short_entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow < 0.0
  - indicator: smf_strength
    params: {}
    operator: smf_strength > 0.4
  - indicator: adx
    params:
      period: 14
    operator: '> 20.0'
exit:
- type: stop_loss
  params:
    pct: 1.5
- type: take_profit
  params:
    pct: 2.5
- type: trailing_stop
  params:
    pct: 1.0
- type: trailing_stop
  params:
    atr_multiplier: 2.0
    min_mult: 0.5
    max_mult: 1.5
- type: stop_loss
  params:
    atr_multiplier: 3.0
risk:
  sizing: 0.01
  max_positions: 3
