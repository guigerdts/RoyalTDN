max_hold_hours: 24
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow < 0.3
  - indicator: zscore
    params:
      period: 20
    operator: '< -2.0'
