---
name: intraday_support_resistance
symbol: LINKUSDT
timeframe: 30m
max_hold_hours: 8
min_signal_interval: 120
min_signal_move_pct: 0.05
exit_pct_scale: 0.25    # test mode: 0.60% SL → 0.15%, 6.9% TP → 1.72%
entry:
  logic: AND
  conditions:
  - indicator: support_resistance
    params:
      lookback: 93
      touch_count: 4
      side: support
short_entry:
  logic: AND
  conditions:
  - indicator: support_resistance
    params:
      lookback: 93
      touch_count: 4
      side: resistance
exit:
- type: stop_loss
  params:
    pct: 0.60
- type: take_profit
  params:
    pct: 6.9
risk:
  sizing: 0.005
  max_positions: 4
