name: intraday_trend
symbols:
- BTCUSDT
- ETHUSDT
- SOLUSDT
symbol: ETHUSDT
timeframe: 5m
max_hold_hours: 8
entry:
  logic: AND
  conditions:
  - indicator: vwap
    params: {}
    operator: price > vwap
  - indicator: volume_surge
    params:
      period: 15
      factor: 2.2
short_entry:
  logic: AND
  conditions:
  - indicator: vwap
    params: {}
    operator: price < vwap
  - indicator: volume_surge
    params:
      period: 15
      factor: 2.2
exit:
- type: stop_loss
  params:
    pct: 0.50
- type: trailing_stop
  params:
    pct: 1.5
risk:
  sizing: 0.005
  max_positions: 4
