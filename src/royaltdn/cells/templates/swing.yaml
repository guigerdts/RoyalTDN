name: swing_smf_trend_bollinger
enabled: true
symbol: BTCUSDT
symbols:
- BTCUSDT
- ETHUSDT
- SOLUSDT
timeframe: 1d
max_hold_hours: 72
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow > 0.0
  - indicator: smf_strength
    params: {}
    operator: smf_strength > 0.3
  - indicator: smf_basis
    params: {}
    operator: price > smf_basis
short_entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow < 0.0
  - indicator: smf_strength
    params: {}
    operator: smf_strength > 0.3
  - indicator: smf_basis
    params: {}
    operator: price < smf_basis
exit:
- type: trailing_stop
  params:
    atr_multiplier: 2.0
    min_mult: 0.5
    max_mult: 1.5
- type: stop_loss
  params:
    atr_multiplier: 3.0
risk:
  sizing: 0.02
  max_positions: 2
