---
name: swing_reversion
enabled: true
symbol: BTCUSDT
symbols:
- BTCUSDT
- ETHUSDT
- LINKUSDT
timeframe: 1d
max_hold_hours: 48
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: bollinger_lower
    params:
      period: 20
      std: 2.0
    operator: price < bollinger_lower
  - indicator: rsi
    params:
      period: 48
    operator: < 32.0
short_entry:
  logic: AND
  conditions:
  - indicator: bollinger_upper
    params:
      period: 20
      std: 2.0
    operator: price > bollinger_upper
  - indicator: rsi
    params:
      period: 48
    operator: '> 68.0'
exit:
- type: stop_loss
  params:
    pct: 1.0
- type: take_profit
  params:
    pct: 3.0
risk:
  sizing: 0.005
  max_positions: 2
