name: swing_reversion
symbols:
- BTCUSDT
- ETHUSDT
- LINKUSDT
entry:
  logic: AND
  conditions:
  - indicator: bollinger_lower
    params:
      period: 20
      std: 2.0
    operator: price < bollinger_lower
  - indicator: rsi
    params:
      period: 48
    operator: < 32.0
short_entry:
  logic: AND
  conditions:
  - indicator: bollinger_upper
    params:
      period: 20
      std: 2.0
    operator: price > bollinger_upper
  - indicator: rsi
    params:
      period: 48
    operator: '> 68.0'
exit:
- type: take_profit
  params:
    atr_multiplier: 3.8000000000000003
risk:
  sizing: 0.005
  max_positions: 2
