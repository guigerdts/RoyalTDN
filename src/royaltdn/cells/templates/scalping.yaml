name: scalping_momentum
symbols:
- BTCUSDT
- ETHUSDT
- SOLUSDT
- ADAUSDT
- LINKUSDT
symbol: BTCUSDT
timeframe: 1m
max_hold_hours: 4
entry:
  logic: AND
  conditions:
  - indicator: ema
    params:
      period: 23
    operator: price > ema
  - indicator: rsi
    params:
      period: 23
    operator: < 32.0
short_entry:
  logic: AND
  conditions:
  - indicator: ema
    params:
      period: 23
    operator: price < ema
  - indicator: rsi
    params:
      period: 23
    operator: '> 68.0'
exit:
- type: stop_loss
  params:
    pct: 0.35
- type: take_profit
  params:
    pct: 0.45
risk:
  sizing: 0.005
  max_positions: 3
