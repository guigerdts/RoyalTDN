name: scalping_smf_retest_rsi
enabled: true
symbol: ETHUSDT
symbols:
- ETHUSDT
- BTCUSDT
- SOLUSDT
timeframe: 15m
max_hold_hours: 8
reentry_cooldown: 0
min_signal_interval: 0
entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow > 0.0
  - indicator: smf_basis
    params: {}
    operator: price < smf_basis
  - indicator: rsi
    params:
      period: 7
    operator: < 40.0
short_entry:
  logic: AND
  conditions:
  - indicator: smf_flow
    params: {}
    operator: smf_flow < 0.0
  - indicator: smf_basis
    params: {}
    operator: price > smf_basis
  - indicator: rsi
    params:
      period: 7
    operator: '> 60.0'
exit:
- type: trailing_stop
  params:
    atr_multiplier: 2.0
    min_mult: 0.5
    max_mult: 1.5
- type: stop_loss
  params:
    atr_multiplier: 3.0
risk:
  sizing: 0.01
  max_positions: 3
